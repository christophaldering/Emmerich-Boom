  - path: "artifacts/emmerich/public/images/project-1.png"
    description: "Abstract geometric 3D shapes in high contrast neon green and dark grey, brutalist and modern"
    aspect_ratio: "16:9"
  - path: "artifacts/emmerich/public/images/project-2.png"
    description: "Dynamic light streaks and motion blur in neon colors against a pitch black background, conveying extreme speed and growth"
    aspect_ratio: "16:9"
  - path: "artifacts/emmerich/public/images/project-3.png"
